<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#07070f">
  <meta name="description" content="Steruj swoim telefonem przez AI — Gemini">
  <title>PhoneAI</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">

  <!-- Ambient orbs -->
  <div class="orbs" aria-hidden="true">
    <div class="orb o1"></div>
    <div class="orb o2"></div>
    <div class="orb o3"></div>
  </div>

  <!-- ══════════════════════ SETUP SCREEN ══════════════════════ -->
  <div id="setup" class="screen">
    <div class="setup-inner">
      <div class="setup-icon">
        <svg width="56" height="56" viewBox="0 0 56 56" fill="none">
          <rect x="14" y="4" width="28" height="48" rx="7" fill="#1a0533" stroke="#7c3aed" stroke-width="1.5"/>
          <rect x="17" y="9" width="22" height="35" rx="4" fill="#07070f"/>
          <circle cx="28" cy="49" r="2.5" fill="rgba(167,139,250,.4)"/>
          <path d="M28 16 L30 22 L37 22 L31.5 26 L33.5 33 L28 29 L22.5 33 L24.5 26 L19 22 L26 22 Z" fill="#a78bfa"/>
        </svg>
      </div>

      <h1>PhoneAI</h1>
      <p>Steruj swoim telefonem przez Gemini AI</p>

      <div class="setup-box">
        <label for="apiKeyInput">Klucz API Gemini (darmowy)</label>
        <input
          type="password"
          id="apiKeyInput"
          placeholder="AIzaSy…"
          autocomplete="off"
          spellcheck="false"
        >
        <a
          href="https://aistudio.google.com/apikey"
          target="_blank"
          rel="noopener noreferrer"
          class="hint-link"
        >Pobierz darmowy klucz → aistudio.google.com</a>
      </div>

      <button id="saveKeyBtn" class="btn-primary">Zacznij ›</button>
    </div>
  </div>

  <!-- ══════════════════════ MAIN SCREEN ═══════════════════════ -->
  <div id="main" class="screen">

    <!-- Header -->
    <header>
      <div class="header-left">
        <div class="ai-avatar" aria-hidden="true">
          <div class="ai-dot"></div>
        </div>
        <div>
          <div class="header-title">PhoneAI</div>
          <div class="header-sub" id="aiStatus">Gotowy</div>
        </div>
      </div>
      <button id="wakeBtn" class="icon-btn wake-btn" title='Włącz "Hej Benedykt"' aria-label='Nasłuchuj na Hej Benedykt'>
        <!-- ear / always-listen icon -->
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 11a9 9 0 1 1 18 0c0 5-3.5 8-6 10"/>
          <path d="M9 9a3 3 0 0 1 6 0c0 3-2 5-3 6"/>
          <circle cx="13" cy="20" r="1" fill="currentColor" stroke="none"/>
        </svg>
      </button>
      <button id="settingsBtn" class="icon-btn" aria-label="Ustawienia">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </header>

    <!-- Quick action chips -->
    <div class="quick-actions" role="toolbar" aria-label="Szybkie polecenia">
      <button class="qa-chip" data-cmd="Zwibruj telefon dwa razy">📳 Wibracja</button>
      <button class="qa-chip" data-cmd="Włącz latarkę">🔦 Latarka</button>
      <button class="qa-chip" data-cmd="Podaj moją aktualną lokalizację GPS">📍 Lokalizacja</button>
      <button class="qa-chip" data-cmd="Sprawdź poziom baterii">🔋 Bateria</button>
      <button class="qa-chip" data-cmd="Powiedz na głos: Cześć! Jestem twoim telefonem sterowanym przez AI">🔊 Głos</button>
      <button class="qa-chip" data-cmd="Pokaż powiadomienie z tytułem 'PhoneAI' i tekstem 'Działa!'">🔔 Notyfikacja</button>
      <button class="qa-chip" data-cmd="Otwórz YouTube">▶️ YouTube</button>
      <button class="qa-chip" data-cmd="Otwórz Google Maps">🗺️ Mapy</button>
      <button class="qa-chip" data-cmd="Podaj informacje o tym urządzeniu">📱 Info</button>
      <button class="qa-chip" data-cmd="Zagraj dźwięk sukcesu">🎵 Dźwięk</button>
      <button class="qa-chip" data-cmd="Porównaj ceny iPhone 16 w sklepach ceneo i allegro">💰 Porównaj ceny</button>
      <button class="qa-chip" data-cmd="Otwórz przeglądarkę i wyszukaj najtańsze laptopy do 2000 zł">🌐 Przeglądarka</button>
    </div>

    <!-- Chat messages -->
    <div id="chatMessages" class="chat-messages" role="log" aria-live="polite">
      <!-- populated by JS -->
    </div>

    <!-- Typing indicator -->
    <div id="typingIndicator" class="typing-indicator hidden" aria-hidden="true">
      <div class="msg-avatar-wrap"><div class="ai-dot-sm"></div></div>
      <div class="typing-dots">
        <span></span><span></span><span></span>
      </div>
    </div>

    <!-- Photo preview overlay -->
    <div id="photoPreview" class="photo-preview hidden" role="dialog" aria-label="Zdjęcie">
      <img id="photoImg" alt="Zdjęcie z aparatu">
      <button id="closePhoto" aria-label="Zamknij zdjęcie">✕</button>
    </div>

    <!-- Input area -->
    <div class="input-area">
      <button id="voiceBtn" class="voice-btn" aria-label="Wejście głosowe">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 15c1.66 0 3-1.34 3-3V6c0-1.66-1.34-3-3-3S9 4.34 9 6v6c0 1.66 1.34 3 3 3z"/>
          <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
        </svg>
      </button>
      <textarea
        id="messageInput"
        placeholder="Napisz polecenie…"
        rows="1"
        maxlength="2000"
        aria-label="Pole wiadomości"
      ></textarea>
      <button id="sendBtn" class="send-btn" aria-label="Wyślij">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>

  </div><!-- /main -->

  <!-- ══════════════════════ SETTINGS PANEL ════════════════════ -->
  <div id="settingsPanel" class="settings-panel hidden" role="dialog" aria-label="Ustawienia">
    <div class="settings-content">
      <div class="settings-header">
        <h2>Ustawienia</h2>
        <button id="closeSettings" class="icon-btn" aria-label="Zamknij">✕</button>
      </div>
      <div class="settings-body">
        <label for="apiKeyEdit">Klucz API Gemini</label>
        <input
          type="password"
          id="apiKeyEdit"
          placeholder="AIzaSy…"
          autocomplete="off"
          spellcheck="false"
        >
        <a
          href="https://aistudio.google.com/apikey"
          target="_blank"
          rel="noopener noreferrer"
          class="hint-link"
        >Pobierz darmowy klucz na aistudio.google.com</a>

        <label for="modelSelect" style="margin-top:20px">Model AI</label>
        <select id="modelSelect">
          <option value="gemini-2.0-flash">Gemini 2.0 Flash ⚡ (zalecany, darmowy)</option>
          <option value="gemini-1.5-flash">Gemini 1.5 Flash (darmowy)</option>
          <option value="gemini-1.5-pro">Gemini 1.5 Pro</option>
          <option value="gemini-2.0-flash-thinking-exp">Gemini 2.0 Flash Thinking (eksperymentalny)</option>
        </select>

        <button id="saveSettings" class="btn-primary" style="margin-top:24px">Zapisz ustawienia</button>

        <div class="danger-zone">
          <button id="clearChat" class="btn-secondary">🗑 Wyczyść historię czatu</button>
        </div>
      </div>
    </div>
  </div>

</div><!-- /app -->
<script src="app.js"></script>
</body>
</html>
